<!DOCTYPE html>
<html lang="pt-br">

    <style>


        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #181818;
            color: #fff;
        }



         


        .pessoa-container{
            display: flex;
            align-items: center;
            width: 100%;
            padding: 8px;
        }
        
       

        


        .pessoa-foto-container{
            
        }

        .pessoa-foto{
            width: 64px;
            height: 64px;
            background-color: red;
        }


        .pessoa-content{
            width: 100%;
            padding-left: 4px;
        }



        .pessoa-nome{
            font-size: 1.2em;
        }


        .pessoa-grafico{
            margin-top: 4px;
        }

        .pessoa-barra{
            background-color: #353535;
            height: 5px;
            width: 100%;
        }
        .pesssoa-barra-fill{
            width: 0%;
            height: 100%;
            background-color: aqua;
        }




    </style>


</head>



<body>

    
    


    <div id="lista">

    <script>



        var candidatos = [

            {
                'nome': 'BENTO',
                'foto-url': 'https://divulgacandcontas.tse.jus.br/candidaturas/oficial/2022/BR/RN/546/candidatos/902042/foto.jpg',
                'receita': 0,
                'despesa': 0
            },

            {
                'nome': 'CAPITÃO STYVENSON',
                'foto-url': 'https://divulgacandcontas.tse.jus.br/candidaturas/oficial/2022/BR/RN/546/candidatos/911372/foto.jpeg',

                'receita': 98928.72,
                'despesa': 91223.70
            },

            {
                'nome': 'DANNIEL MORAIS',
                'foto-url': 'https://divulgacandcontas.tse.jus.br/candidaturas/oficial/2022/BR/RN/546/candidatos/892014/foto.jpg',
                'receita': 213285.92,
                'despesa': 171450.00
            },

            {
                'nome': 'FABIO DANTAS',

                'receita': 29000.00,
                'despesa': 0
            }

        ];
        




        var lista = document.getElementById('lista');


        function addItem( nome, fotoURL, receita, despesa ){


            let pessoa = document.createElement('div');
            pessoa.classList.add('pessoa-container');


            let percent = despesa / receita * 100;

            pessoa.innerHTML = `
            <div class="pessoa-foto-container">
                <img src="${fotoURL}" class="pessoa-foto">
            </div>

            <div class="pessoa-content">

                <div class="pessoa-nome">${nome}</div>
                <div class="pessoa-receitas">(Recebido) R$ ${Intl.NumberFormat('pt-br').format(receita)}</div>
                <div class="pesssoa-despesa">(Gasto) R$ ${Intl.NumberFormat('pt-br').format(despesa)}</div>
                
                <div class="pessoa-grafico">
                    <div class="pessoa-legenda">Gasto/Recebido</div>
                    <div class="pessoa-barra"> <div class="pesssoa-barra-fill" style="width: ${percent}%"></div> </div>
                </div>

            </div>
            `;


            lista.appendChild(pessoa);


        }







        function gerarLista(){

            candidatos.sort((a, b)=>{
                if ( a.receita < b.receita ) return 1;
                if ( a.receita > b.receita ) return -1;
                return 0;
            });

            candidatos.forEach((item, index)=>{
                addItem(item.nome, item["foto-url"], item.receita, item.despesa);
            });

        }

        gerarLista();




        


    </script>


</body>
